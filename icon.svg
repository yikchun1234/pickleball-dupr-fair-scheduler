<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#5a9c38"/>
      <stop offset="100%" stop-color="#2d5016"/>
    </radialGradient>
    <linearGradient id="courtGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#4a8c28"/>
      <stop offset="100%" stop-color="#3a7020"/>
    </linearGradient>
  </defs>

  <!-- Outer dark green ring -->
  <circle cx="512" cy="512" r="500" fill="#1a3a0a"/>

  <!-- Inner green gradient -->
  <circle cx="512" cy="512" r="470" fill="url(#bgGrad)"/>

  <!-- Court lines -->
  <ellipse cx="512" cy="580" rx="380" ry="200" fill="none" stroke="#ffffff" stroke-width="6" opacity="0.3"/>
  <line x1="132" y1="580" x2="892" y2="580" stroke="#ffffff" stroke-width="4" opacity="0.3"/>
  <line x1="512" y1="380" x2="512" y2="780" stroke="#ffffff" stroke-width="4" opacity="0.3"/>

  <!-- Scale of justice -->
  <rect x="502" y="280" width="20" height="200" fill="#c0c0c0"/>
  <rect x="420" y="280" width="184" height="12" fill="#a0a0a0" rx="4"/>
  <!-- Left pan -->
  <line x1="430" y1="292" x2="430" y2="340" stroke="#a0a0a0" stroke-width="3"/>
  <ellipse cx="430" cy="345" rx="35" ry="12" fill="#c0c0c0"/>
  <!-- Right pan -->
  <line x1="594" y1="292" x2="594" y2="340" stroke="#a0a0a0" stroke-width="3"/>
  <ellipse cx="594" cy="345" rx="35" ry="12" fill="#c0c0c0"/>
  <!-- Top circle with DP -->
  <circle cx="512" cy="260" r="45" fill="#4a8c28" stroke="#ffffff" stroke-width="4"/>
  <text x="512" y="275" font-family="Arial, sans-serif" font-size="36" font-weight="bold" fill="#ffffff" text-anchor="middle">DP</text>

  <!-- Left player (female) -->
  <g transform="translate(280, 480)">
    <!-- Body -->
    <ellipse cx="0" cy="40" rx="35" ry="50" fill="#ffffff"/>
    <!-- Head -->
    <circle cx="0" cy="-20" r="30" fill="#f0c8a0"/>
    <!-- Hair -->
    <path d="M -25,-30 Q -30,-50 -15,-55 Q 0,-58 15,-55 Q 30,-50 25,-30 Z" fill="#4a3020"/>
    <!-- Arm holding paddle -->
    <line x1="20" y1="20" x2="60" y2="-10" stroke="#f0c8a0" stroke-width="12" stroke-linecap="round"/>
    <!-- Paddle -->
    <ellipse cx="75" cy="-20" rx="25" ry="35" fill="#ff6b35" transform="rotate(-20 75 -20)"/>
    <rect x="65" y="10" width="8" height="30" fill="#8b4513" rx="2" transform="rotate(-20 69 25)"/>
    <!-- Legs -->
    <line x1="-15" y1="85" x2="-25" y2="140" stroke="#ffffff" stroke-width="14" stroke-linecap="round"/>
    <line x1="15" y1="85" x2="30" y2="140" stroke="#ffffff" stroke-width="14" stroke-linecap="round"/>
    <!-- Shoes -->
    <ellipse cx="-28" cy="145" rx="15" ry="8" fill="#333333"/>
    <ellipse cx="33" cy="145" rx="15" ry="8" fill="#333333"/>
  </g>

  <!-- Right player (male) -->
  <g transform="translate(744, 480)">
    <!-- Body -->
    <ellipse cx="0" cy="40" rx="40" ry="55" fill="#ffffff"/>
    <!-- Head -->
    <circle cx="0" cy="-20" r="32" fill="#f0c8a0"/>
    <!-- Hair -->
    <path d="M -28,-25 Q -30,-45 0,-48 Q 30,-45 28,-25 Z" fill="#2a1a10"/>
    <!-- Arm holding paddle -->
    <line x1="-20" y1="20" x2="-60" y2="-10" stroke="#f0c8a0" stroke-width="12" stroke-linecap="round"/>
    <!-- Paddle -->
    <ellipse cx="-75" cy="-20" rx="25" ry="35" fill="#ff6b35" transform="rotate(20 -75 -20)"/>
    <rect x="-73" y="10" width="8" height="30" fill="#8b4513" rx="2" transform="rotate(20 -69 25)"/>
    <!-- Legs -->
    <line x1="-20" y1="90" x2="-35" y2="145" stroke="#ffffff" stroke-width="16" stroke-linecap="round"/>
    <line x1="20" y1="90" x2="35" y2="145" stroke="#ffffff" stroke-width="16" stroke-linecap="round"/>
    <!-- Shoes -->
    <ellipse cx="-38" cy="150" rx="16" ry="9" fill="#333333"/>
    <ellipse cx="38" cy="150" rx="16" ry="9" fill="#333333"/>
  </g>

  <!-- Top text: DUPR FAIR SCHEDULER -->
  <path id="topArc" d="M 150,512 A 362,362 0 0,1 874,512" fill="none"/>
  <text font-family="Arial, sans-serif" font-size="52" font-weight="bold" fill="#ffffff" letter-spacing="4">
    <textPath href="#topArc" startOffset="50%" text-anchor="middle">DUPR FAIR SCHEDULER</textPath>
  </text>

  <!-- Bottom text: BALANCED MATCHMAKING -->
  <path id="bottomArc" d="M 180,512 A 332,332 0 0,0 844,512" fill="none"/>
  <text font-family="Arial, sans-serif" font-size="44" font-weight="bold" fill="#ffffff" letter-spacing="3">
    <textPath href="#bottomArc" startOffset="50%" text-anchor="middle">BALANCED MATCHMAKING</textPath>
  </text>

  <!-- Outer border -->
  <circle cx="512" cy="512" r="498" fill="none" stroke="#ffffff" stroke-width="8"/>
</svg>
